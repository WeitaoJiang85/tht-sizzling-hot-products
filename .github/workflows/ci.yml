name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend
        run: dotnet restore backend/SizzlingHotProducts.Api/SizzlingHotProducts.Api.csproj

      - name: Build backend
        run: dotnet build backend/SizzlingHotProducts.Api/SizzlingHotProducts.Api.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/SizzlingHotProducts.Tests/SizzlingHotProducts.Tests.csproj --configuration Release --no-build

  frontend:
    name: Frontend Lint Test Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type check frontend
        working-directory: frontend
        run: npm run type-check

      - name: Test frontend
        working-directory: frontend
        run: npm exec vitest run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
