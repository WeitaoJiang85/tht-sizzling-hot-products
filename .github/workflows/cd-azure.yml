name: CD Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional existing image tag to deploy (example: commit SHA). Leave empty to build from current source."
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  BACKEND_IMAGE_NAME: sizzling-hot-products-api
  FRONTEND_IMAGE_NAME: sizzling-hot-products-web

jobs:
  deploy:
    name: Build Or Select Image And Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        if: ${{ github.event.inputs.image_tag == '' || github.event_name == 'push' }}
        uses: actions/checkout@v5

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA}"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        if: ${{ github.event.inputs.image_tag == '' || github.event_name == 'push' }}
        run: |
          docker build \
            -f backend/SizzlingHotProducts.Api/Dockerfile \
            -t $REGISTRY/$BACKEND_IMAGE_NAME:${{ steps.tag.outputs.value }} \
            .
          docker push $REGISTRY/$BACKEND_IMAGE_NAME:${{ steps.tag.outputs.value }}

      - name: Build and push frontend image
        if: ${{ github.event.inputs.image_tag == '' || github.event_name == 'push' }}
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }} \
            --build-arg NEXT_PUBLIC_API_TIMEOUT=${{ vars.NEXT_PUBLIC_API_TIMEOUT || '30000' }} \
            -t $REGISTRY/$FRONTEND_IMAGE_NAME:${{ steps.tag.outputs.value }} \
            .
          docker push $REGISTRY/$FRONTEND_IMAGE_NAME:${{ steps.tag.outputs.value }}

      - name: Deploy backend to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ secrets.ACA_BACKEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$REGISTRY/$BACKEND_IMAGE_NAME:${{ steps.tag.outputs.value }}"

      - name: Deploy frontend to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ secrets.ACA_FRONTEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$REGISTRY/$FRONTEND_IMAGE_NAME:${{ steps.tag.outputs.value }}"

      - name: Smoke check backend health endpoint
        run: |
          BACKEND_URL=$(az containerapp show \
            --name "${{ secrets.ACA_BACKEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          curl --fail --silent --show-error "https://${BACKEND_URL}/api/health"
